<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Process - Drop & Stars Edition</title>
    <style>
        :root {
            /* Mismos colores de diseño */
            --bg-color: #03001c;        
            --primary-glow: #00f2fe;   
            --secondary-glow: #bd00ff; 
            --text-color: #e0e0e0;
            --circle-size: 120px;
        }

        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden; /* Para que nada se salga durante la animación y las estrellas */
            background-color: var(--bg-color);
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- CAPA DE FONDO INTERACTIVO Y ESTRELLAS --- */
        #interactive-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Detrás de todo */
            /* Efecto de halo de ratón */
            background: 
                radial-gradient(circle at center, rgba(189, 0, 255, 0.05) 0%, rgba(3, 0, 28, 0) 60%),
                var(--bg-color);
        }

        /* Contenedor para las estrellas fugaces */
        #shooting-stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* No intercepta clics */
        }

        .shooting-star {
            position: absolute;
            height: 2px;
            background: linear-gradient(-45deg, rgba(189, 0, 255, 0), rgba(0, 242, 254, 1), rgba(189, 0, 255, 0));
            filter: drop-shadow(0 0 6px rgba(0, 242, 254, 1));
            animation: shoot 1.5s ease-out;
            opacity: 0;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(-45deg) scaleX(0); opacity: 0; }
            10% { opacity: 1; transform: translateX(0) translateY(0) rotate(-45deg) scaleX(1); }
            100% { transform: translateX(400px) translateY(400px) rotate(-45deg) scaleX(0); opacity: 0; }
        }

        /* --- ESTILOS DE DISEÑO (SIN CAMBIOS) --- */
        .process-container {
            display: flex;
            gap: 20px;
            padding: 40px;
            flex-wrap: nowrap; /* Mantenemos fila única para la animación */
            justify-content: center;
            z-index: 10; /* Delante del fondo */
            perspective: 1000px; /* Para efecto 3D en la caída */
        }

        .step-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 160px;
            cursor: pointer;
            
            /* --- ANIMACIÓN DE ENTRADA EXTRAORDINARIA (MODIFICADO) --- */
            opacity: 0; /* Empiezan invisibles */
            transform: translateY(-800px) rotateX(45deg); /* Caen de muy arriba */
            filter: blur(10px); /* Efecto de velocidad */
            animation: extraordinaryDrop 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Definición de la animación de caída con rebote y aclarado */
        @keyframes extraordinaryDrop {
            0% {
                opacity: 0;
                transform: translateY(-800px) rotateX(45deg);
                filter: blur(10px);
            }
            70% { /* Punto de impacto */
                opacity: 1;
                transform: translateY(15px) rotateX(0deg); /* Ligeramente más abajo de su posición final */
                filter: blur(0px);
            }
            85% { /* Rebote hacia arriba */
                transform: translateY(-10px);
            }
            100% { /* Posición final */
                opacity: 1;
                transform: translateY(0) rotateX(0deg);
                filter: blur(0px);
            }
        }

        /* --- RETRASOS SECUENCIALES PARA LA ANIMACIÓN --- */
        .step-wrapper:nth-child(1) { animation-delay: 0.1s; }
        .step-wrapper:nth-child(2) { animation-delay: 0.3s; }
        .step-wrapper:nth-child(3) { animation-delay: 0.5s; }
        .step-wrapper:nth-child(4) { animation-delay: 0.7s; }
        .step-wrapper:nth-child(5) { animation-delay: 0.9s; }

        .circle {
            width: var(--circle-size);
            height: var(--circle-size);
            border: 5px solid transparent;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-image: linear-gradient(var(--bg-color), var(--bg-color)), 
                              linear-gradient(135deg, var(--secondary-glow), var(--primary-glow));
            background-origin: border-box;
            background-clip: padding-box, border-box;
            box-shadow: 0 0 15px rgba(189, 0, 255, 0.3), inset 0 0 10px rgba(0, 242, 254, 0.2);
            margin-bottom: 25px;
            z-index: 11;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        .circle::after {
            content: '';
            position: absolute;
            right: -22px; 
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-left: 22px solid var(--primary-glow);
            z-index: 12;
            filter: drop-shadow(0 0 5px var(--primary-glow));
        }

        .step-wrapper:last-child .circle::after {
            display: none;
        }

        .icon {
            width: 50px;
            height: 50px;
            filter: invert(90%) sepia(100%) saturate(1000%) hue-rotate(170deg) brightness(110%);
            opacity: 0.9;
        }

        .label {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-color);
            line-height: 1.4;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Hover (SIN CAMBIOS) */
        .step-wrapper:hover {
            transform: translateY(-10px) !important; /* !important para anular el transform final de la animación */
        }

        .step-wrapper:hover .circle {
            box-shadow: 0 0 30px rgba(189, 0, 255, 0.6), inset 0 0 20px rgba(0, 242, 254, 0.4);
        }
    </style>
</head>
<body>

    <div id="interactive-bg">
        <div id="shooting-stars-container"></div>
    </div>

    <div class="process-container">
        <div class="step-wrapper">
            <div class="circle">
                <img src="https://cdn-icons-png.flaticon.com/512/3097/3097412.png" class="icon" alt="Envía app">
            </div>
            <div class="label">Envía<br>app</div>
        </div>

        <div class="step-wrapper">
            <div class="circle">
                <img src="https://cdn-icons-png.flaticon.com/512/3462/3462153.png" class="icon" alt="Resource Manager">
            </div>
            <div class="label">Resource<br>Manager</div>
        </div>

        <div class="step-wrapper">
            <div class="circle">
                <img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png" class="icon" alt="Node Manager">
            </div>
            <div class="label">Node<br>Manager</div>
        </div>

        <div class="step-wrapper">
            <div class="circle">
                <img src="https://cdn-icons-png.flaticon.com/512/9385/9385289.png" class="icon" alt="Solicita contenedores">
            </div>
            <div class="label">Solicita<br>contenedores</div>
        </div>

        <div class="step-wrapper">
            <div class="circle">
                <img src="https://cdn-icons-png.flaticon.com/512/1055/1055644.png" class="icon" alt="Asigna contenedores">
            </div>
            <div class="label">Asigna<br>contenedores</div>
        </div>
    </div>

    <script>
        // 1. Fondo Interactivo (Halo de ratón)
        const bg = document.getElementById('interactive-bg');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            bg.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(189, 0, 255, 0.15) 0%, rgba(3, 0, 28, 0) 50%), var(--bg-color)`;
        });

        // 2. Sistema de Estrellas Fugaces
        const container = document.getElementById('shooting-stars-container');

        function createShootingStar() {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            
            // Posición inicial aleatoria en la parte superior/izquierda
            const startX = Math.random() * (window.innerWidth * 0.8);
            const startY = Math.random() * (window.innerHeight * 0.4);
            const length = Math.random() * 80 + 100; // Longitud aleatoria de la estela

            star.style.left = `${startX}px`;
            star.style.top = `${startY}px`;
            star.style.width = `${length}px`;

            container.appendChild(star);

            // Eliminar el elemento después de que termine la animación
            star.addEventListener('animationend', () => {
                star.remove();
            });
        }

        // Función para lanzar estrellas a intervalos aleatorios
        function launchStarSystem() {
            createShootingStar();
            // Espera entre 3 y 8 segundos para la siguiente estrella
            const nextLaunch = Math.random() * 5000 + 3000; 
            setTimeout(launchStarSystem, nextLaunch);
        }

        // Iniciar el sistema de estrellas
        launchStarSystem();
    </script>
</body>
</html>
